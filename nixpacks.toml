[phases.setup]
nixPkgs = ["python311", "chromium", "nss", "nspr", "atk", "cups", "gtk3", "gdk-pixbuf", "pango", "cairo", "xvfb-run"]

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium"]

[start]
cmd = "gunicorn app:app --workers 2 --threads 4 --timeout 300 --bind 0.0.0.0:$PORT"
